<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>現場進捗状況管理システム（新築工事）</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.1.0/iconfont/tabler-icons.min.css">
<!-- Firebase SDK（複数端末でのデータ共有用） -->

<style>
:root{
  --color-background-primary:#ffffff;
  --color-background-secondary:#F4F4F2;
  --color-background-tertiary:#ECECE9;
  --color-text-primary:#1F1E1C;
  --color-text-secondary:#5F5E5A;
  --color-text-tertiary:#888780;
  --color-border-tertiary:rgba(0,0,0,0.1);
  --color-border-secondary:rgba(0,0,0,0.2);
  --color-border-primary:rgba(0,0,0,0.3);
  --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  --font-mono:"SF Mono",Consolas,"Courier New",monospace;
}
@media (prefers-color-scheme: dark){
  :root{
    --color-background-primary:#1F1E1C;
    --color-background-secondary:#2A2926;
    --color-background-tertiary:#363430;
    --color-text-primary:#F4F4F2;
    --color-text-secondary:#B4B2A9;
    --color-text-tertiary:#888780;
    --color-border-tertiary:rgba(255,255,255,0.12);
    --color-border-secondary:rgba(255,255,255,0.2);
    --color-border-primary:rgba(255,255,255,0.3);
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);color:var(--color-text-primary);background:var(--color-background-tertiary)}
.page{max-width:1400px;margin:0 auto;padding:1.25rem}
.app-title{font-size:18px;font-weight:600;margin-bottom:1rem;color:var(--color-text-primary)}
.wrap{padding:.75rem;background:var(--color-background-primary);border-radius:12px;border:0.5px solid var(--color-border-tertiary)}
.topbar{display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.period-tabs{display:flex;gap:4px;flex-wrap:wrap;flex:1;min-width:0}
.ptab{padding:5px 14px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:6px;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary);white-space:nowrap;transition:all .12s}
.ptab.on{background:#E6F1FB;color:#0C447C;border-color:#185FA5;font-weight:500}
.ptab:hover:not(.on){background:var(--color-background-secondary)}
.tbtn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:6px;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary);white-space:nowrap;transition:all .12s}
.tbtn:hover{background:var(--color-background-secondary)}
.tbtn.blu{background:#E6F1FB;color:#0C447C;border-color:#185FA5}
.tbtn.grn{background:#EAF3DE;color:#27500A;border-color:#3B6D11}
.tbtn.on{background:#E1F5EE;color:#085041;border-color:#0F6E56}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:1rem}
.sc{background:var(--color-background-secondary);border-radius:8px;padding:.7rem .9rem}
.sc-lbl{font-size:11px;color:var(--color-text-secondary);margin-bottom:2px;white-space:nowrap}
.sc-val{font-size:19px;font-weight:500}
.sc-val.sm{font-size:13px}
.toolrow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.75rem;align-items:center}
.srch{flex:1;min-width:140px;font-size:13px;padding:6px 10px;border:0.5px solid var(--color-border-secondary);border-radius:6px;background:var(--color-background-primary);color:var(--color-text-primary)}
.sel{font-size:13px;padding:6px 10px;border:0.5px solid var(--color-border-secondary);border-radius:6px;background:var(--color-background-primary);color:var(--color-text-primary)}
.sort-bar{display:flex;gap:6px;align-items:center;margin-bottom:.6rem;flex-wrap:wrap}
.sort-bar span{font-size:12px;color:var(--color-text-secondary)}
.sbtn{padding:3px 10px;font-size:12px;border:0.5px solid var(--color-border-secondary);border-radius:5px;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary)}
.sbtn.on{background:#185FA5;color:#fff;border-color:#185FA5}
.legend-wrap{display:flex;gap:16px;margin-bottom:.75rem;flex-wrap:wrap}
.legend-group{display:flex;flex-direction:column;gap:4px}
.legend-title{font-size:11px;font-weight:500;color:var(--color-text-secondary);margin-bottom:2px}
.legend-items{display:flex;gap:8px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--color-text-secondary)}
.leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.leg-sq{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.tbl-wrap{border:0.5px solid var(--color-border-tertiary);border-radius:10px;overflow:auto}
table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed;min-width:1300px}
th{background:var(--color-background-secondary);padding:8px 8px;text-align:left;font-size:11px;font-weight:500;color:var(--color-text-secondary);border-bottom:0.5px solid var(--color-border-tertiary);white-space:nowrap;position:sticky;top:0;z-index:5}
td{padding:7px 8px;border-bottom:0.5px solid var(--color-border-tertiary);vertical-align:middle;word-break:break-all;line-height:1.35}
tr:last-child td{border-bottom:none}
.drag-row{cursor:default}
.drag-row:hover td{background:var(--color-background-secondary)}
.drag-row.dragging{opacity:.35}
.drag-row.drag-over td{border-top:2px solid #185FA5}
.total-row td{font-weight:500;background:var(--color-background-secondary);font-size:12px}
.grand-row td{font-weight:500;background:#E6F1FB;color:#0C447C;font-size:12px}
.sec-head td{padding:5px 8px;font-size:11px;font-weight:500;letter-spacing:.04em}
.c-grip{width:20px}.c-no{width:28px}.c-type{width:40px}.c-name{width:110px}
.c-month{width:46px}.c-loc{width:82px}.c-sub{width:160px}
.c-des{width:82px}.c-sup{width:82px}.c-note{width:68px}
.c-m{width:110px}.c-p{width:100px}.c-r{width:80px}.c-lock{width:40px}
.mon{text-align:right;font-family:var(--font-mono);font-size:11px}
.rh{background:#EAF3DE;color:#27500A;display:inline-block;padding:1px 5px;border-radius:4px;font-size:11px;font-weight:500}
.rm{background:#E6F1FB;color:#0C447C;display:inline-block;padding:1px 5px;border-radius:4px;font-size:11px;font-weight:500}
.rl{background:#FAEEDA;color:#633806;display:inline-block;padding:1px 5px;border-radius:4px;font-size:11px;font-weight:500}
.tk{background:#E1F5EE;color:#085041;display:inline-block;padding:1px 5px;border-radius:4px;font-size:10px;font-weight:500}
.ts{background:#FAEEDA;color:#633806;display:inline-block;padding:1px 5px;border-radius:4px;font-size:10px;font-weight:500}
.lk{text-align:center;color:var(--color-text-tertiary)}
.grip{color:var(--color-text-tertiary);font-size:14px;user-select:none;display:flex;align-items:center;justify-content:center;cursor:grab}
.name-bar{display:inline-block;width:3px;height:13px;border-radius:2px;margin-right:4px;vertical-align:middle;flex-shrink:0}
.person-pill{display:inline-flex;align-items:center;gap:4px;font-size:12px}
.person-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-start;justify-content:center;z-index:200;padding-top:2rem;overflow-y:auto}
.modal{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:12px;padding:1.25rem;width:560px;max-width:96vw;max-height:88vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:500;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:0.5px solid var(--color-border-tertiary)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:.75rem}
.f1{grid-column:1/-1}
.fl label{display:block;font-size:11px;color:var(--color-text-secondary);margin-bottom:3px}
.fl input,.fl select,.fl textarea{width:100%;font-size:13px;padding:5px 8px;border:0.5px solid var(--color-border-secondary);border-radius:6px;background:var(--color-background-primary);color:var(--color-text-primary)}
.fl textarea{resize:vertical;height:48px}
.divline{font-size:11px;font-weight:500;color:var(--color-text-secondary);grid-column:1/-1;border-top:0.5px solid var(--color-border-tertiary);padding-top:.5rem;text-transform:uppercase;letter-spacing:.04em}
.mfooter{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem;padding-top:.75rem;border-top:0.5px solid var(--color-border-tertiary)}
.calc-hint{font-size:12px;color:var(--color-text-primary);background:var(--color-background-secondary);border-radius:6px;padding:5px 8px;min-height:30px;display:flex;align-items:center}
.merr{color:#A32D2D;font-size:12px;margin-top:.25rem}
.mlist{display:flex;flex-direction:column;gap:5px;margin-bottom:.75rem;max-height:200px;overflow-y:auto}
.mitem{display:flex;align-items:center;gap:8px;padding:5px 8px;background:var(--color-background-secondary);border-radius:6px;font-size:13px}
.mitem span{flex:1}
.mitem button{font-size:11px;padding:2px 8px;border:0.5px solid var(--color-border-secondary);border-radius:5px;cursor:pointer;background:var(--color-background-primary);color:#A32D2D}
.madd{display:flex;gap:8px}
.madd input{flex:1;font-size:13px;padding:5px 8px}
.pform{display:flex;flex-direction:column;gap:10px;margin-bottom:1rem}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#0F6E56;color:#fff;padding:.5rem 1rem;border-radius:8px;font-size:13px;opacity:0;transition:opacity .3s;z-index:300;pointer-events:none}
.toast.show{opacity:1}

/* ガントチャート */
.gantt-wrap{overflow-x:auto;border:0.5px solid var(--color-border-tertiary);border-radius:10px}
.gantt-table{width:100%;border-collapse:collapse;font-size:12px}
.gantt-table th{background:var(--color-background-secondary);padding:6px 8px;text-align:center;font-size:11px;font-weight:500;color:var(--color-text-secondary);border-bottom:0.5px solid var(--color-border-tertiary);border-right:0.5px solid var(--color-border-tertiary);white-space:nowrap;position:sticky;top:0;z-index:5}
.gantt-table td{padding:4px 6px;border-bottom:0.5px solid var(--color-border-tertiary);border-right:0.5px solid var(--color-border-tertiary);vertical-align:middle}
.gantt-table tr:last-child td{border-bottom:none}
.gantt-table tr:hover td{background:var(--color-background-secondary)}
.gantt-name{width:130px;font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px;position:sticky;left:0;background:var(--color-background-primary);z-index:3}
.gantt-table tr:hover .gantt-name{background:var(--color-background-secondary)}
.gantt-des{width:70px;font-size:11px;white-space:nowrap;position:sticky;left:130px;background:var(--color-background-primary);z-index:3}
.gantt-table tr:hover .gantt-des{background:var(--color-background-secondary)}
.gantt-cell{width:60px;min-width:60px;padding:4px 3px;text-align:center}
.gantt-bar{height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gantt-bar-start{border-radius:4px 0 0 4px}
.gantt-bar-mid{border-radius:0}
.gantt-bar-end{border-radius:0 4px 4px 0}
.gantt-bar-only{border-radius:4px}
.gantt-month-header{text-align:center;font-size:11px}
.gantt-sec-head{background:#E1F5EE;color:#085041;font-weight:500;font-size:11px}
.gantt-sec-head-sei{background:#FAEEDA;color:#633806}

/* 集計表 */
.summary-section{margin-bottom:1.5rem}
.summary-title{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:.5rem;padding:.5rem .75rem;background:var(--color-background-secondary);border-radius:6px;display:flex;align-items:center;gap:6px}
.summary-wrap{border:0.5px solid var(--color-border-tertiary);border-radius:10px;overflow:hidden;margin-bottom:1rem}
.summary-table{width:100%;border-collapse:collapse;font-size:12px}
.summary-table th{background:var(--color-background-secondary);padding:7px 10px;text-align:left;font-size:11px;font-weight:500;color:var(--color-text-secondary);border-bottom:0.5px solid var(--color-border-tertiary);white-space:nowrap}
.summary-table th.r{text-align:right}
.summary-table td{padding:7px 10px;border-bottom:0.5px solid var(--color-border-tertiary);vertical-align:middle}
.summary-table tr:last-child td{border-bottom:none}
.summary-table tr:hover td{background:var(--color-background-secondary)}
.summary-table td.r{text-align:right;font-family:var(--font-mono);font-size:11px}
.summary-total td{font-weight:500;background:var(--color-background-secondary)}
.summary-grand td{font-weight:500;background:#E6F1FB;color:#0C447C}
.diff-pos{color:#0F6E56;font-weight:500}
.diff-neg{color:#A32D2D;font-weight:500}
.diff-zero{color:var(--color-text-tertiary)}
.sync-note{font-size:11px;color:var(--color-text-tertiary);margin-top:.5rem;line-height:1.6}
</style>
</head>
<body>
<div class="page">
<div class="app-title"><i class="ti ti-building" aria-hidden="true"></i> 現場進捗状況管理システム（新築工事）</div>
<div class="wrap" id="app">

<div class="topbar">
  <div class="period-tabs" id="ptabs"></div>
  <div style="display:flex;gap:6px;flex-shrink:0;align-items:center">
    <span id="syncStatus" style="font-size:11px;color:var(--color-text-tertiary);display:flex;align-items:center;gap:4px"><i class="ti ti-loader" aria-hidden="true"></i>接続中...</span>
    <button class="tbtn" onclick="openPM()"><i class="ti ti-calendar-plus" aria-hidden="true"></i>期を追加</button>
    <button class="tbtn" onclick="openMM()"><i class="ti ti-users" aria-hidden="true"></i>担当者</button>
    <button class="tbtn" id="authBtn" onclick="toggleAuth()"><i class="ti ti-lock" aria-hidden="true"></i>社内</button>
    <button class="tbtn grn" onclick="saveAll()"><i class="ti ti-device-floppy" aria-hidden="true"></i>保存</button>
  </div>
</div>

<div class="stats" id="stats"></div>

<div class="toolrow">
  <input class="srch" type="text" id="q" placeholder="現場名・担当者で検索..." oninput="render()"/>
  <select class="sel" id="typeF" onchange="render()"><option value="">種別 すべて</option><option value="kan">関工務所</option><option value="sei">設計事務所</option></select>
  <select class="sel" id="desF" onchange="render()"><option value="">設計担当 すべて</option></select>
  <select class="sel" id="supF" onchange="render()"><option value="">現場監督 すべて</option></select>
  <button class="tbtn blu" onclick="openEdit(null)"><i class="ti ti-plus" aria-hidden="true"></i>現場追加</button>
</div>

<div class="sort-bar">
  <span>並び順:</span>
  <button class="sbtn" id="so-month" onclick="setSort('month')">着工月順</button>
  <button class="sbtn" id="so-name" onclick="setSort('name')">名前順</button>
  <span style="margin-left:auto;font-size:11px;color:var(--color-text-tertiary)">ドラッグで並び替え可（並び替え後は保存ボタンを押してください）</span>
</div>

<div style="display:flex;gap:6px;margin-bottom:.75rem">
  <button class="sbtn" id="view-table" onclick="setView('table')">一覧表</button>
  <button class="sbtn" id="view-gantt" onclick="setView('gantt')">ガントチャート</button>
  <button class="sbtn" id="view-summary" onclick="setView('summary')">集計</button>
</div>

<div class="legend-wrap" id="legendWrap"></div>

<div id="viewTable">
  <div class="tbl-wrap"><table id="tbl"><thead id="thead"></thead><tbody id="tbody"></tbody></table></div>
</div>

<div id="viewGantt" style="display:none">
  <div id="ganttArea"></div>
</div>

<div id="viewSummary" style="display:none">
  <div id="summaryArea"></div>
</div>

<div class="sync-note" id="syncNote">※ 接続を確認しています...</div>

<div style="margin-top:1rem;display:flex;gap:6px;flex-wrap:wrap">
  <button class="tbtn" onclick="exportData()"><i class="ti ti-download" aria-hidden="true"></i>データを書き出す</button>
  <button class="tbtn" onclick="document.getElementById('importFile').click()"><i class="ti ti-upload" aria-hidden="true"></i>データを読み込む</button>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)"/>
</div>

</div>
</div>

<div id="editM" class="modal-bg" style="display:none"><div class="modal">
  <h3 id="etitle">現場を編集</h3>
  <div class="fg">
    <div class="fl"><label>№</label><input id="f-no" type="number"/></div>
    <div class="fl"><label>種別</label><select id="f-type"><option value="kan">関工務所物件</option><option value="sei">設計事務所物件</option></select></div>
    <div class="fl f1"><label>現場名 *</label><input id="f-name"/></div>
    <div class="fl f1"><label>所在地</label><input id="f-loc"/></div>
    <div class="fl f1"><label>補助金事業名</label><input id="f-sub"/></div>
    <div class="fl"><label>設計担当</label><select id="f-des"></select></div>
    <div class="fl"><label>現場監督</label><select id="f-sup"></select></div>
    <div class="fl"><label>担当大工</label><select id="f-daiku"></select></div>
    <div class="fl"><label>着工予定月</label><select id="f-month">
      <option value="">（未定）</option>
      <option value="1月">1月</option><option value="2月">2月</option><option value="3月">3月</option>
      <option value="4月">4月</option><option value="5月">5月</option><option value="6月">6月</option>
      <option value="7月">7月</option><option value="8月">8月</option><option value="9月">9月</option>
      <option value="10月">10月</option><option value="11月">11月</option><option value="12月">12月</option>
    </select></div>
    <div class="fl"><label>完成予定月</label><select id="f-endmonth">
      <option value="">（未定）</option>
      <option value="1月">1月</option><option value="2月">2月</option><option value="3月">3月</option>
      <option value="4月">4月</option><option value="5月">5月</option><option value="6月">6月</option>
      <option value="7月">7月</option><option value="8月">8月</option><option value="9月">9月</option>
      <option value="10月">10月</option><option value="11月">11月</option><option value="12月">12月</option>
    </select></div>
    <div class="fl"><label>期を移動</label><select id="f-moveto"><option value="">（移動しない）</option></select></div>
    <div class="fl f1"><label>備考</label><textarea id="f-note"></textarea></div>
    <div class="divline" id="amtsec">── 金額情報（社内専用）</div>
    <div class="fl"><label>契約時金額（税抜）</label><input id="f-ca" type="text" oninput="calcA()" placeholder="例: 33909091"/></div>
    <div class="fl"><label>契約時原価（税抜）</label><input id="f-cc" type="text" oninput="calcA()" placeholder="例: 25387234"/></div>
    <div class="fl"><label>契約時粗利（自動計算）</label><div class="calc-hint" id="f-cp">—</div></div>
    <div class="fl"><label>契約時粗利率（自動計算）</label><div class="calc-hint" id="f-cr">—</div></div>
    <div class="fl"><label>完成時金額（税抜）</label><input id="f-fa" type="text" oninput="calcA()" placeholder="例: 33909091"/></div>
    <div class="fl"><label>完成時原価（税抜）</label><input id="f-fc" type="text" oninput="calcA()" placeholder="例: 25387234"/></div>
    <div class="fl"><label>完成時粗利（自動計算）</label><div class="calc-hint" id="f-fp">—</div></div>
    <div class="fl"><label>完成時粗利率（自動計算）</label><div class="calc-hint" id="f-fr">—</div></div>
  </div>
  <p class="merr" id="eerr" style="display:none"></p>
  <div class="mfooter">

let S={periods:[...PERIOD_ORDER],data:{},masters:[],period:'49期 2026.7～2027.6',authed:false,sort:'month'};

function monthNum(s){if(!s)return 99;const m=s.match(/(\d+)月/);return m?parseInt(m[1]):99;}
function fmt(n){return(n&&n!==0)?Math.round(n).toLocaleString('ja-JP'):'-';}
function fmtR(r){return(r&&r!==0)?((r*100).toFixed(1)+'%'):'-';}
function calc(a,c){return{p:a-c,r:a>0?(a-c)/a:0};}
function rateBadge(r){
  if(!r||r===0)return '-';
  const p=(r*100).toFixed(1)+'%';
  return r>=0.27?`<span class="rh">${p}</span>`:r>=0.25?`<span class="rm">${p}</span>`:`<span class="rl">${p}</span>`;
}
function getColor(map,palette,name){
  if(!name)return '#aaa';
  if(!map[name]){const k=Object.keys(map).length;map[name]=palette[k%palette.length];}
  return map[name];
}
function dc(name){return getColor(desMap,DES_PALETTE,name);}
function sc(name){return getColor(supMap,SUP_PALETTE,name);}

let usingFirebase=false;
let firebaseUnsub=null;

function waitForFirebase(timeoutMs=4000){
  return new Promise(resolve=>{
    if(window.fbReady===true)return resolve(true);
    if(window.fbReady===false)return resolve(false);
    const t=setTimeout(()=>resolve(!!window.fbReady),timeoutMs);
    window.addEventListener('firebase-ready',()=>{clearTimeout(t);resolve(!!window.fbReady);},{once:true});
  });
}

function setSyncStatus(mode){
  const el=document.getElementById('syncStatus');
  const note=document.getElementById('syncNote');
  if(!el)return;
  if(mode==='online'){
    el.innerHTML='<i class="ti ti-cloud-check" aria-hidden="true"></i>クラウド同期中';
    el.style.color='#0F6E56';
    if(note)note.textContent='※ データはクラウド（Firebase）に保存されます。PC・スマホ・iPadなど、どの端末からでも同じデータを編集・保存できます。';
  }else if(mode==='offline'){
    el.innerHTML='<i class="ti ti-cloud-off" aria-hidden="true"></i>ローカル保存のみ';
    el.style.color='#854F0B';
    if(note)note.textContent='※ クラウド接続が設定されていないため、この端末のブラウザのみに保存されます。';
  }else{
    el.innerHTML='<i class="ti ti-loader" aria-hidden="true"></i>接続中...';
    el.style.color='var(--color-text-tertiary)';
  }
}

async function load(){
  setSyncStatus('connecting');
  const ready=await waitForFirebase();
  const configured=ready && window.fbDb && window.fbDb.app;

  if(configured){
    try{
      const snap=await window.fbDb.ref(SK).get();
      const d=snap.exists()?snap.val():null;
      if(d){
        S.periods=d.periods||[...PERIOD_ORDER];
        S.masters=d.masters||[...SEED_MASTERS];
        if(d.dataArr&&Array.isArray(d.dataArr)&&d.dataArr.length>0){
          // dataArr形式のみ読み込む（data形式は無視して重複を防ぐ）
          S.data={};
          d.dataArr.forEach(item=>{if(item&&item.period)S.data[item.period]=item.rows||[];});
        }else{
          // dataArrがない場合のみシードデータを使用
          S.data={};
        }
        // Firebaseにない期のみシードデータで補完
        PERIOD_ORDER.forEach(p=>{
          if(!S.data[p]||!Array.isArray(S.data[p])||S.data[p].length===0){
            S.data[p]=JSON.parse(JSON.stringify(SD[p]||[]));
          }
        });
      }else{
        S.masters=[...SEED_MASTERS];
        PERIOD_ORDER.forEach(p=>{S.data[p]=JSON.parse(JSON.stringify(SD[p]||[]));});
      }
      S.periods.forEach(p=>{if(!S.data[p])S.data[p]=[];});
      usingFirebase=true;
      setSyncStatus('online');
    }catch(e){
      console.error('Firebase読み込みエラー:',e);
      loadFromLocalStorage();
      PERIOD_ORDER.forEach(p=>{if(!S.data[p])S.data[p]=JSON.parse(JSON.stringify(SD[p]||[]));});
      S.periods.forEach(p=>{if(!S.data[p])S.data[p]=[];});
      usingFirebase=false;
      setSyncStatus('offline');
    }
  }else{
    loadFromLocalStorage();
    PERIOD_ORDER.forEach(p=>{if(!S.data[p])S.data[p]=JSON.parse(JSON.stringify(SD[p]||[]));});
    S.periods.forEach(p=>{if(!S.data[p])S.data[p]=[];});
    usingFirebase=false;
    setSyncStatus('offline');
  }
  buildColorMaps();
  renderAll();
}

function loadFromLocalStorage(){
  try{
    const raw=localStorage.getItem(SK);
    if(raw){
      const d=JSON.parse(raw);
      S.periods=d.periods||[...PERIOD_ORDER];
      S.data=d.data||{};
      S.masters=d.masters||[...SEED_MASTERS];
    }else{
      S.masters=[...SEED_MASTERS];
    }
  }catch(e){S.masters=[...SEED_MASTERS];}
}

function buildColorMaps(){
  Object.values(S.data).forEach(rows=>rows.forEach(r=>{
    if(r.des)dc(r.des);
    if(r.sup)sc(r.sup);
  }));
  S.masters.forEach(m=>{dc(m);sc(m);});
}

function renderAll(){renderTabs();renderStats();renderFilters();buildLegend();renderTable();if(currentView==='gantt')renderGantt();if(currentView==='summary')renderSummary();}
function render(){renderStats();renderFilters();buildLegend();renderTable();if(currentView==='gantt')renderGantt();if(currentView==='summary')renderSummary();}

function renderTabs(){
  // 期番号の大きい順（降順）に並べる
  const sorted=[...S.periods].sort((a,b)=>{
    const na=parseInt(a.match(/(\d+)期/)?.[1]||0);
    const nb=parseInt(b.match(/(\d+)期/)?.[1]||0);
    return nb-na;
  });
  document.getElementById('ptabs').innerHTML=sorted.map(p=>`<button class="ptab${p===S.period?' on':''}" onclick="setPeriod('${p.replace(/'/g,"\\'")}')">${p}</button>`).join('');
}
function setPeriod(p){S.period=p;renderAll();}
function rows(){return S.data[S.period]||[];}
function filtered(){
  const q=(document.getElementById('q').value||'').toLowerCase();
  const tf=document.getElementById('typeF').value;
  const df=document.getElementById('desF').value;
  const sf=document.getElementById('supF').value;
  return rows().filter(r=>{
    if(!r.name)return false;
    if(q&&!(r.name+r.des+r.sup+r.loc).toLowerCase().includes(q))return false;
    if(tf&&r.type!==tf)return false;
    if(df&&r.des!==df)return false;
    if(sf&&r.sup!==sf)return false;
    return true;
  });
}
function sortRows(arr){
  if(S.sort==='month'){
    // 着工月順で並べ替え（同じ月内はデータの順序を維持）
    const result=[...arr];
    result.sort((a,b)=>monthNum(a.month)-monthNum(b.month));
    // 着工月順で並べた結果をデータに反映（次回からこの順序が基準になる）
    const list=S.data[S.period];
    if(list){
      const typeRows=arr[0]?arr.filter(r=>r.type===arr[0].type):arr;
      result.forEach((r,i)=>{
        const idx=list.findIndex(x=>x.no===r.no);
        if(idx>=0)list[idx]=r;
      });
    }
    return result;
  }
  if(S.sort==='name')return[...arr].sort((a,b)=>a.name.localeCompare(b.name,'ja'));
  return arr;
}
function setSort(s){
  S.sort=s;
  // 着工月順・名前順ボタンのon/off
  ['month','name'].forEach(k=>{const e=document.getElementById('so-'+k);if(e)e.classList.toggle('on',k===s);});
  renderTable();
}

function buildLegend(){
  const allRows=rows().filter(r=>r.name);
  const desList=[...new Set(allRows.map(r=>r.des||'').filter(Boolean))].sort();
  const supList=[...new Set(allRows.map(r=>r.sup||'').filter(Boolean))].sort();

  const dHtml=desList.map(n=>`<div class="leg-item"><div class="leg-dot" style="background:${dc(n)}"></div><span>${n}</span></div>`).join('');
  const sHtml=supList.map(n=>`<div class="leg-item"><div class="leg-sq" style="background:${sc(n)}"></div><span>${n}</span></div>`).join('');
  el.innerHTML=`
    <div class="legend-group"><div class="legend-title"><i class="ti ti-pencil" aria-hidden="true" style="font-size:11px"></i> 設計担当</div><div class="legend-items">${dHtml}</div></div>
    <div style="width:0.5px;background:var(--color-border-tertiary);margin:0 4px"></div>
    <div class="legend-group"><div class="legend-title"><i class="ti ti-hard-hat" aria-hidden="true" style="font-size:11px"></i> 現場監督</div><div class="legend-items">${sHtml}</div></div>
  `;
}

function aggGroup(arr){
  function sum(g){
    const ca=g.reduce((s,r)=>s+(r.ca||0),0),cc=g.reduce((s,r)=>s+(r.cc||0),0);
    const fa=g.reduce((s,r)=>s+(r.fa||0),0),fc=g.reduce((s,r)=>s+(r.fc||0),0);
    return{ca,cc,cp:ca-cc,cr:ca>0?(ca-cc)/ca:0,fa,fc,fp:fa-fc,fr:fa>0?(fa-fc)/fa:0,n:g.length};
  }
  const k=sum(arr.filter(r=>r.type==='kan')),s2=sum(arr.filter(r=>r.type==='sei'));
  const tca=k.ca+s2.ca,tcc=k.cc+s2.cc,tfa=k.fa+s2.fa,tfc=k.fc+s2.fc;
  return{kan:k,sei:s2,total:{ca:tca,cc:tcc,cp:tca-tcc,cr:tca>0?(tca-tcc)/tca:0,fa:tfa,fc:tfc,fp:tfa-tfc,fr:tfa>0?(tfa-tfc)/tfa:0,n:k.n+s2.n}};
}

}

  if(kanRows.length&&seiRows.length)html+=totH('合　計',ag.total,'grand-row');

function setupDrag(){
  const trs=document.querySelectorAll('.drag-row');
  trs.forEach(row=>{
    row.addEventListener('dragstart',e=>{dragSrc=row;row.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    row.addEventListener('dragend',()=>{trs.forEach(r=>r.classList.remove('dragging','drag-over'));dragSrc=null;});
    row.addEventListener('dragover',e=>{e.preventDefault();trs.forEach(r=>r.classList.remove('drag-over'));if(row!==dragSrc)row.classList.add('drag-over');});
    row.addEventListener('drop',e=>{
      e.preventDefault();if(!dragSrc||dragSrc===row)return;
      const si=parseInt(dragSrc.dataset.no),ti=parseInt(row.dataset.no);
      const list=S.data[S.period];
      const a=list.findIndex(r=>r.no===si),b=list.findIndex(r=>r.no===ti);
      if(a<0||b<0)return;
      const [item]=list.splice(a,1);list.splice(b,0,item);
      renderTable();
    });
  });
}

  const no=parseInt(document.getElementById('f-no').value),name=document.getElementById('f-name').value.trim();

  const cc=S.authed?parseAmt('f-cc'):0;
  const fa=S.authed?parseAmt('f-fa'):0;

// Firebaseのキーに使えない文字を変換する
function sanitizeForFirebase(obj){
  if(typeof obj!=='object'||obj===null)return obj;
  if(Array.isArray(obj))return obj.map(sanitizeForFirebase);
  const result={};
  for(const key of Object.keys(obj)){
    const safeKey=key.replace(/\./g,'_').replace(/#/g,'_').replace(/\$/g,'_').replace(/\[/g,'_').replace(/\]/g,'_').replace(/\//g,'_').replace(/~/g,'_').replace(/ /g,'_');
    result[safeKey]=sanitizeForFirebase(obj[key]);
  }
  return result;
}
// Firebaseから読み込んだキー名を元に戻す
function restoreFromFirebase(obj,originalKeys){
  if(typeof obj!=='object'||obj===null)return obj;
  if(Array.isArray(obj))return obj.map(item=>restoreFromFirebase(item,originalKeys));
  const result={};
  for(const key of Object.keys(obj)){
    // originalKeysから対応する元のキーを探す
    const originalKey=originalKeys.find(k=>{
      const safe=k.replace(/\./g,'_').replace(/#/g,'_').replace(/\$/g,'_').replace(/\[/g,'_').replace(/\]/g,'_').replace(/\//g,'_').replace(/~/g,'_').replace(/ /g,'_');
      return safe===key;
    })||key;
    result[originalKey]=obj[key];
  }
  return result;
}

async function saveAll(){
  // 保存前に各期のデータから重複（nameが同じもの）を除去
  S.periods.forEach(p=>{
    if(!S.data[p])return;
    const seen=new Set();
    S.data[p]=S.data[p].filter(r=>{
      if(!r.name)return false;
      if(seen.has(r.name)){
        console.warn(`重複を除去: ${p} - ${r.name}`);
        return false;
      }
      seen.add(r.name);
      return true;
    });
  });

  if(window.fbDb && window.fbReady===true){
    try{
      const dataArr=S.periods.map(p=>({period:p,rows:S.data[p]||[]}));
      // dataフィールドは保存しない（dataArrのみで統一）
      const payload={periods:S.periods,masters:S.masters,dataArr:dataArr};
      await window.fbDb.ref(SK).set(payload);
      showToast('保存しました（全端末に反映されます）');
      setSyncStatus('online');
    }catch(e){
      console.error('Firebase保存エラー:',e);
      alert('クラウド保存に失敗しました: '+e.message);
      try{localStorage.setItem(SK,JSON.stringify({periods:S.periods,data:S.data,masters:S.masters}));}catch(e2){}
    }
  }else{
    try{
      localStorage.setItem(SK,JSON.stringify({periods:S.periods,data:S.data,masters:S.masters}));
      showToast('保存しました（この端末のみ）');
    }catch(e){alert('保存に失敗: '+e.message);}
  }
}

function renderGantt(){
  const MONTHS=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const fr=filtered();
  const sorted=sortRows(fr);
  const kanRows=sorted.filter(r=>r.type==='kan');
  const seiRows=sorted.filter(r=>r.type==='sei');

  let html=`<div class="gantt-wrap"><table class="gantt-table"><thead><tr>
    <th class="gantt-name" style="position:sticky;left:0;z-index:6;min-width:130px">現場名</th>
    <th class="gantt-des" style="position:sticky;left:130px;z-index:6;min-width:70px">設計担当</th>
    ${MONTHS.map(m=>`<th class="gantt-cell gantt-month-header">${m}</th>`).join('')}
  </tr></thead><tbody>`;

  function ganttRow(r){
    const startM=MONTHS.indexOf(r.month);
    const endM=MONTHS.indexOf(r.endmonth);
    const dCol=dc(r.des);
    let cells='';
    MONTHS.forEach((_,i)=>{
      const inRange=startM>=0&&(
        endM>=0 ? (i>=startM&&i<=endM) : i===startM
      );
      if(!inRange){
        cells+=`<td class="gantt-cell" style="padding:4px 0;border-right:0.5px solid var(--color-border-tertiary)"></td>`;
        return;
      }
      const isStart=i===startM;
      const isEnd=endM>=0?i===endM:true;
      const only=startM===endM||(endM<0);
      // バーのrounding: 開始セルは左丸、終了セルは右丸、中間は四角
      const borderRadius=only?'4px':(isStart?'4px 0 0 4px':(isEnd?'0 4px 4px 0':'0'));
      // セル間の境界をなくしてバーをシームレスに
      const paddingL=isStart?'4px':'0';
      const paddingR=isEnd?'4px':'0';
      const label=only?`${r.month}${r.endmonth?'〜'+r.endmonth:''}`:(isStart?r.month:'');
      cells+=`<td class="gantt-cell" style="padding:4px ${paddingR} 4px ${paddingL};border-right:${isEnd?'0.5px solid var(--color-border-tertiary)':'none'}">
        <div style="height:22px;background:${dCol};border-radius:${borderRadius};display:flex;align-items:center;${isStart?'padding-left:6px':''};font-size:10px;color:#fff;font-weight:500;white-space:nowrap;overflow:hidden">${label}</div>
      </td>`;
    });
    return`<tr>
      <td class="gantt-name" style="position:sticky;left:0;background:var(--color-background-primary);z-index:3">
        <span style="display:inline-block;width:3px;height:12px;background:${dCol};border-radius:2px;margin-right:4px;vertical-align:middle"></span>
        <span style="font-size:12px;font-weight:500">${r.name}</span>
      </td>
      <td class="gantt-des" style="position:sticky;left:130px;background:var(--color-background-primary);z-index:3;font-size:11px;color:var(--color-text-secondary)">
        <span style="display:flex;align-items:center;gap:4px">
          <span style="width:7px;height:7px;border-radius:50%;background:${dCol};flex-shrink:0;display:inline-block"></span>${r.des||''}
        </span>
      </td>
      ${cells}
    </tr>`;
  }

  if(kanRows.length){
    html+=`<tr><td class="gantt-name gantt-sec-head" style="position:sticky;left:0;z-index:3" colspan="${2+12}">● 関工務所物件（${kanRows.length}棟）</td></tr>`;
    html+=kanRows.map(r=>ganttRow(r)).join('');
  }
  if(seiRows.length){
    html+=`<tr><td class="gantt-name gantt-sec-head gantt-sec-head-sei" style="position:sticky;left:0;z-index:3" colspan="${2+12}">● 設計事務所物件（${seiRows.length}棟）</td></tr>`;
    html+=seiRows.map(r=>ganttRow(r)).join('');
  }

  html+=`</tbody></table></div>`;
  document.getElementById('ganttArea').innerHTML=html;
}

function renderSummary(){
  if(!S.authed){
    document.getElementById('summaryArea').innerHTML=`
      <div style="text-align:center;padding:2rem;color:var(--color-text-secondary)">
        <i class="ti ti-lock" aria-hidden="true" style="font-size:24px;display:block;margin-bottom:.5rem"></i>
        集計情報は社内モードでのみ表示されます
      </div>`;
    return;
  }

  const allRows=(S.data[S.period]||[]).filter(r=>r.name);
  const fmt=n=>(n&&n!==0)?Math.round(n).toLocaleString('ja-JP'):'-';
  const fmtR=r=>(r&&r!==0)?((r*100).toFixed(1)+'%'):'-';
  const diffClass=d=>d>0.005?'diff-pos':d<-0.005?'diff-neg':'diff-zero';
  const diffFmt=d=>d===null?'-':(d>0?'+':'')+((d*100).toFixed(1))+'%';

  // 設計担当別集計（契約時）
  function buildDesMap(){
    const map={};
    allRows.forEach(r=>{
      const key=r.des||'（未設定）';
      if(!map[key])map[key]={name:key,count:0,ca:0,cp:0,faCount:0,fa:0,fp:0};
      map[key].count++;
      map[key].ca+=r.ca||0;
      map[key].cp+=(r.ca||0)-(r.cc||0);
      if(r.fa){map[key].faCount++;map[key].fa+=r.fa||0;map[key].fp+=(r.fa||0)-(r.fc||0);}
    });
    return Object.values(map).sort((a,b)=>b.ca-a.ca);
  }

  // 現場監督別集計（完成時）
  function buildSupMap(){
    const map={};
    allRows.forEach(r=>{
      const key=r.sup||'（未設定）';
      if(!map[key])map[key]={name:key,count:0,ca:0,cc:0,fa:0,fc:0,faCount:0};
      map[key].count++;
      map[key].ca+=r.ca||0;
      map[key].cc+=r.cc||0;
      map[key].fa+=r.fa||0;
      map[key].fc+=r.fc||0;
      if(r.fa)map[key].faCount++;
    });
    return Object.values(map).sort((a,b)=>b.fa-a.fa);
  }

  const desList=buildDesMap();
  const supList=buildSupMap();

  // 設計担当別合計
  const desTotalCa=desList.reduce((s,r)=>s+r.ca,0);
  const desTotalCp=desList.reduce((s,r)=>s+r.cp,0);
  const desTotalCr=desTotalCa>0?desTotalCp/desTotalCa:0;
  const desTotalFa=desList.reduce((s,r)=>s+r.fa,0);
  const desTotalFp=desList.reduce((s,r)=>s+r.fp,0);
  const desTotalFr=desTotalFa>0?desTotalFp/desTotalFa:0;

  // 現場監督別合計
  const supTotalFa=supList.reduce((s,r)=>s+r.fa,0);
  const supTotalFp=supList.reduce((s,r)=>s+(r.fa-r.fc),0);
  const supTotalFr=supTotalFa>0?supTotalFp/supTotalFa:0;
  const supTotalCa=supList.reduce((s,r)=>s+r.ca,0);
  const supTotalCp=supList.reduce((s,r)=>s+(r.ca-r.cc),0);
  const supTotalCr=supTotalCa>0?supTotalCp/supTotalCa:0;

  // 設計担当別テーブル
  function desRow(d){
    const cr=d.ca>0?d.cp/d.ca:0;
    const fr=d.fa>0?d.fp/d.fa:0;
    const diff=d.fa>0?fr-cr:null;
    const dCol=dc(d.name);
    return`<tr>
      <td>
        <span style="display:flex;align-items:center;gap:6px">
          <span style="width:8px;height:8px;border-radius:50%;background:${dCol};flex-shrink:0"></span>
          <span style="font-weight:500">${d.name}</span>
        </span>
      </td>
      <td class="r">${d.count}棟</td>
      <td class="r">${fmt(d.ca)}</td>
      <td class="r">${fmt(d.cp)}</td>
      <td class="r">${rateBadge(cr)}</td>
      <td class="r">${d.fa?fmt(d.fa):'-'}</td>
      <td class="r">${d.fa?fmt(d.fp):'-'}</td>
      <td class="r">${d.fa?rateBadge(fr):'-'}</td>
      <td class="r ${diffClass(diff||0)}">${diffFmt(diff)}</td>
    </tr>`;
  }

  // 現場監督別テーブル
  function supRow(s){
    const cr=s.ca>0?(s.ca-s.cc)/s.ca:0;
    const fr=s.fa>0?(s.fa-s.fc)/s.fa:0;
    const diff=s.fa>0?fr-cr:null;
    const sCol=sc(s.name);
    return`<tr>
      <td>
        <span style="display:flex;align-items:center;gap:6px">
          <span style="width:8px;height:8px;border-radius:2px;background:${sCol};flex-shrink:0"></span>
          <span style="font-weight:500">${s.name}</span>
        </span>
      </td>
      <td class="r">${s.count}棟</td>
      <td class="r">${fmt(s.ca)}</td>
      <td class="r">${fmt(s.ca-s.cc)}</td>
      <td class="r">${rateBadge(cr)}</td>
      <td class="r">${s.fa?fmt(s.fa):'-'}</td>
      <td class="r">${s.fa?fmt(s.fa-s.fc):'-'}</td>
      <td class="r">${s.fa?rateBadge(fr):'-'}</td>
      <td class="r ${diffClass(diff||0)}">${diffFmt(diff)}</td>
    </tr>`;
  }

  const diffDesTotal=desTotalFa>0?desTotalFr-desTotalCr:null;
  const diffSupTotal=supTotalFa>0?supTotalFr-supTotalCr:null;

  const html=`
  <div class="summary-section">
    <div class="summary-title"><i class="ti ti-pencil" aria-hidden="true"></i> 設計担当別集計（${S.period}）</div>
    <div class="summary-wrap">
      <table class="summary-table">
        <thead><tr>
          <th style="width:120px">設計担当</th>
          <th class="r" style="width:50px">件数</th>
          <th class="r" style="width:110px">契約金額（税抜）</th>
          <th class="r" style="width:100px">契約粗利</th>
          <th class="r" style="width:80px">契約時粗利率</th>
          <th class="r" style="width:110px">完成金額（税抜）</th>
          <th class="r" style="width:100px">完成粗利</th>
          <th class="r" style="width:80px">完成時粗利率</th>
          <th class="r" style="width:80px">粗利率の差</th>
        </tr></thead>
        <tbody>
          ${desList.map(desRow).join('')}
          <tr class="summary-total">
            <td><strong>合　計</strong></td>
            <td class="r">${allRows.length}棟</td>
            <td class="r">${fmt(desTotalCa)}</td>
            <td class="r">${fmt(desTotalCp)}</td>
            <td class="r">${rateBadge(desTotalCr)}</td>
            <td class="r">${desTotalFa?fmt(desTotalFa):'-'}</td>
            <td class="r">${desTotalFa?fmt(desTotalFp):'-'}</td>
            <td class="r">${desTotalFa?rateBadge(desTotalFr):'-'}</td>
            <td class="r ${diffClass(diffDesTotal||0)}">${diffFmt(diffDesTotal)}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="summary-section">
    <div class="summary-title"><i class="ti ti-hard-hat" aria-hidden="true"></i> 現場監督別集計（${S.period}）</div>
    <div class="summary-wrap">
      <table class="summary-table">
        <thead><tr>
          <th style="width:120px">現場監督</th>
          <th class="r" style="width:50px">件数</th>
          <th class="r" style="width:110px">契約金額（税抜）</th>
          <th class="r" style="width:100px">契約粗利</th>
          <th class="r" style="width:80px">契約時粗利率</th>
          <th class="r" style="width:110px">完成金額（税抜）</th>
          <th class="r" style="width:100px">完成粗利</th>
          <th class="r" style="width:80px">完成時粗利率</th>
          <th class="r" style="width:80px">粗利率の差</th>
        </tr></thead>
        <tbody>
          ${supList.map(supRow).join('')}
          <tr class="summary-total">
            <td><strong>合　計</strong></td>
            <td class="r">${allRows.length}棟</td>
            <td class="r">${fmt(supTotalCa)}</td>
            <td class="r">${fmt(supTotalCp)}</td>
            <td class="r">${rateBadge(supTotalCr)}</td>
            <td class="r">${supTotalFa?fmt(supTotalFa):'-'}</td>
            <td class="r">${supTotalFa?fmt(supTotalFp):'-'}</td>
            <td class="r">${supTotalFa?rateBadge(supTotalFr):'-'}</td>
            <td class="r ${diffClass(diffSupTotal||0)}">${diffFmt(diffSupTotal)}</td>
          </tr>
        </tbody>
      </table>
    </div>
    <div style="font-size:11px;color:var(--color-text-tertiary);margin-top:.25rem">※ 粗利率の差＝完成時粗利率－契約時粗利率。完成データがある物件のみ対象。プラスは改善、マイナスは悪化を示します。</div>
  </div>`;

  document.getElementById('summaryArea').innerHTML=html;
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

// Firebase初期化完了後にloadを呼ぶ（すでに完了していれば即実行）
if(window.fbReady!==undefined){
  load();
}else{
  window.addEventListener('firebase-ready',()=>load(),{once:true});
  // 5秒待ってもfirebase-readyが来なければローカルモードで起動
  setTimeout(()=>{if(window.fbReady===undefined){window.fbReady=false;load();}},5000);
}
</script>
</body>
</html>
